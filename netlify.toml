# Security headers for harborlineband.com (P332 r3d).
# Build config intentionally omitted — Netlify dashboard settings stay authoritative.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://mbqyznttpvebahgygsbx.supabase.co https://www.facebook.com; connect-src 'self' https://mbqyznttpvebahgygsbx.supabase.co wss://mbqyznttpvebahgygsbx.supabase.co https://accounts.google.com https://www.googleapis.com https://connect.facebook.net https://www.facebook.com; frame-src 'self' https://vimeo.com https://player.vimeo.com https://forms.monday.com https://accounts.google.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"
